name: singa_airport
description: Singa Airport App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0
  flutter_native_splash: ^2.4.7
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  rename: ^3.1.0
  rename_app: ^1.6.5
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#12141C"
  adaptive_icon_foreground: "assets/images/app_logo.png"
  min_sdk_android: 21
  background_color_ios: "#12141C"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#12141C"
  image: "assets/images/app_logo.png"
  android: true
  ios: true
  fullscreen: true
  android_gravity: center
  ios_content_mode: center
  android_12:
    color: "#12141C"
    image: "assets/images/app_logo.png"
    icon_background_color: "#12141C"
    